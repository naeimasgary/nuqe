name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allow running this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      # Build the main Vite web app into /dist
      - name: Build web app
        run: npm run build

      # Build Storybook into /storybook-static (non-blocking — web app deploys even if Storybook fails)
      - name: Build Storybook
        run: npm run build-storybook || echo "Storybook build failed, continuing without it"
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      # Combine: web app at root, Storybook at /storybook/ (if it was built)
      - name: Combine build outputs
        run: |
          mkdir -p _site
          cp -r dist/. _site/
          if [ -d storybook-static ]; then
            mkdir -p _site/storybook
            cp -r storybook-static/. _site/storybook/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
